<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bolão da Copa 2026</title>


<!-- Favicon -->
<link rel="icon" type="image/x-icon" href="favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="favicon.ico">
<link rel="apple-touch-icon" href="apple-touch-icon.png">

<!-- OpenGraph / WhatsApp -->
<meta property="og:type"        content="website">
<meta property="og:title"       content="⚽ Bolão da Copa 2026">
<meta property="og:description" content="Classificação animada dia a dia do bolão da Copa do Mundo 2026.">
<meta property="og:image"       content="og-image.jpg">
<meta property="og:image:width"  content="1200">
<meta property="og:image:height" content="630">
<meta property="og:locale"      content="pt_BR">

<!-- Twitter / iMessage -->
<meta name="twitter:card"        content="summary_large_image">
<meta name="twitter:title"       content="⚽ Bolão da Copa 2026">
<meta name="twitter:description" content="Classificação animada dia a dia do bolão da Copa do Mundo 2026.">
<meta name="twitter:image"       content="og-image.jpg">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div id="app">
<div id="frame">

  <!-- ══ Decoração estática de fundo ══ -->
  <div id="bg-deco" aria-hidden="true"></div>

  <div id="header">
    <div id="header-top">
      <div class="title">⚽ BOLÃO DA <span>COPA 2026</span></div>
      <div id="header-actions">
        <button id="btn-first-top" aria-label="Primeiro dia"><i class="fa-solid fa-angles-left"></i></button>
        <button id="btn-prev-top"  aria-label="Dia anterior"><i class="fa-solid fa-angle-left"></i></button>
        <button id="btn-play-top"  aria-label="Play/Pause"><i class="fa-solid fa-play"></i></button>
        <button id="btn-next-top"  aria-label="Próximo dia"><i class="fa-solid fa-angle-right"></i></button>
        <button id="btn-last-top"  aria-label="Último dia"><i class="fa-solid fa-angles-right"></i></button>
      </div>
    </div>
    <div id="header-sub-row">
      <div class="sub">Classificação dia a dia</div>
      <div id="date-block">
        <span id="date-day">11</span>
        <span id="date-sub"><span id="date-month">JUN</span> <span id="date-year">2026</span></span>
      </div>
    </div>
  </div>
  <div id="chart"></div>
  <div id="footer">
    <div class="source">Fonte: WebBolão</div>
  </div>
</div>

<div id="controls">
  <button id="btn-first"><i class="fa-solid fa-angles-left"></i></button>
  <button id="btn-prev"><i class="fa-solid fa-angle-left"></i></button>
  <button id="btn-play"><i class="fa-solid fa-play"></i> Play</button>
  <button id="btn-next"><i class="fa-solid fa-angle-right"></i></button>
  <button id="btn-last"><i class="fa-solid fa-angles-right"></i></button>
  <span class="ctrl-label" id="day-indicator">1/18</span>

  <div class="ctrl-sep"></div>

  <label class="ctrl-label" for="sel-topn">Top</label>
  <select id="sel-topn">
    <option value="5">5</option>
    <option value="10">10</option>
    <option value="15" >15</option>
    <option value="20">20</option>
    <option value="27" selected>Todos</option>
  </select>

  <div class="ctrl-sep"></div>

  <button id="btn-speed">1.5×</button>

  <div class="ctrl-sep"></div>

  <button id="btn-mute">🔊</button>

  <div class="ctrl-sep"></div>

  <button id="btn-snapshot">📷 Foto</button>
  <button id="btn-record">⏺ Gravar MP4</button>

  <div id="progress-bar">
    <div id="progress-fill"></div>
  </div>
</div>
</div><!-- #app -->

<!-- Áudio de fundo em loop — coloque o arquivo em docs/music.mp3 -->
<audio id="bg-music" src="audio.mp3" loop preload="auto"></audio>

<script src="app.js"></script>
</body>
</html>
